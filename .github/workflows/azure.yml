name: Build and Deploy with Docker Compose

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AZURE_WEBAPP_NAME: iot-edge 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # lint:
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v4

  #   - name: Frontend Lint
  #     working-directory: ./frontend
  #     run: |
  #       npm ci
  #       npm run lint
      
  #   - name: Backend Lint
  #     working-directory: ./backend
  #     run: |
  #       npm ci
  #       npm run lint

  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Docker Compose services
        run: |
          export REGISTRY=${{ env.REGISTRY }}
          export GITHUB_SHA=${{ github.sha }}
          export IMAGE_NAME=${{ env.IMAGE_NAME }}
          
          docker compose build frontend
          docker compose build backend 
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_APP_URL: ${{secrets.NEXT_PUBLIC_APP_URL}}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_GITHUB_ID: ${{ secrets.NEXTAUTH_GITHUB_ID }}
          NEXTAUTH_GITHUB_SECRET: ${{ secrets.NEXTAUTH_GITHUB_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SENDGRID_API: ${{ secrets.SENDGRID_API }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PLAN_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PLAN_ID }}
          NEXT_PUBLIC_STRIPE_PRO_YEARLY_PLAN_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRO_YEARLY_PLAN_ID }}
          NEXT_PUBLIC_STRIPE_BUSINESS_MONTHLY_PLAN_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_BUSINESS_MONTHLY_PLAN_ID }}
          NEXT_PUBLIC_STRIPE_BUSINESS_YEARLY_PLAN_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_BUSINESS_YEARLY_PLAN_ID }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG: ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET: ${{ secrets.INFLUXDB_BUCKET }}
          INFLUXDB_URL: ${{ secrets.INFLUXDB_URL }}

      - name: Push Frontend Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          
      - name: Push Backend Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            echo "Logging in to GitHub Container Registry..."
            echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pull latest images"
            docker compose pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            docker compose pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

            echo "Stop existing containers"
            docker compose down

            echo "Start new containers"
            docker ps
            docker images
            docker compose up backend-container
            docker compose up frontend-container

            echo "Pruning old Docker images..."
            docker image prune -f

            echo "Deployment completed successfully!"







